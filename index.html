<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE HUB | Premium Stock Dashboard</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Premium NEPSE Stock Dashboard for real-time market analysis, portfolio tracking, and latest market news.">
    <meta name="keywords" content="NEPSE, Nepal Stock Exchange, Stock Dashboard, Portfolio Tracker, Nepal Finance">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="app">
                <!-- Dashboard Content -->
                <div class="fade-in">
                    <div class="section-header">
                        <h2>Market Overview</h2>
                        <div style="font-size: 0.875rem; color: var(--text-secondary);">
                            <i class="fas fa-circle" style="color: var(--secondary); font-size: 0.5rem; vertical-align: middle;"></i> Market Open
                        </div>
                    </div>
                    
                    <div id="dashboard-grid" class="dashboard-grid">
                        <div class="loading-placeholder">Loading market data...</div>
                    </div>

                    <div class="content-section">
                        <div class="section-header">
                            <h3>Sector Performance</h3>
                        </div>
                        <div class="glass" style="padding: 2rem; border-radius: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 0.8rem;">Banking</div>
                                <div class="positive" style="font-weight: 700; font-size: 1.2rem;">+1.2%</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 0.8rem;">Hydropower</div>
                                <div class="negative" style="font-weight: 700; font-size: 1.2rem;">-0.5%</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 0.8rem;">Insurance</div>
                                <div class="positive" style="font-weight: 700; font-size: 1.2rem;">+0.8%</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="color: var(--text-secondary); font-size: 0.8rem;">Hotels</div>
                                <div class="positive" style="font-weight: 700; font-size: 1.2rem;">+2.1%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Initialization Script -->
    <script type="module">
        import globalState from './js/state.js';
        import { Layout } from './js/layout.js';
        import { StockCard } from './components/stockCard.js';
        import { initStockChart } from './components/chart.js';

        async function init() {
            globalState.setState({ activePage: 'index' });
            await Layout.init();
            
            globalState.subscribe((state) => {
                if (state.stocks.length > 0) {
                    renderStocks(state.stocks);
                }
            });
        }

        function renderStocks(stocks) {
            const grid = document.getElementById('dashboard-grid');
            if (!grid) return;
            grid.innerHTML = stocks.map(stock => StockCard(stock)).join('');
            
            stocks.forEach(stock => {
                initStockChart(`chart-${stock.symbol}`, stock.history, stock.change >= 0);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
