<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Screener | NEPSE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/themes.css">
    <style>
        .screener-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .signal-card {
            padding: 1.5rem;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .signal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .signal-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-bullish { background: rgba(16, 185, 129, 0.1); color: var(--secondary); border: 1px solid var(--secondary); }
        .badge-bearish { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .badge-neutral { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); border: 1px solid var(--surface-border); }

        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
        }
        .metric-label { color: var(--text-secondary); }
        .metric-value { font-weight: 600; }
        
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="app">
                <div class="fade-in">
                    <div class="section-header">
                        <div>
                            <h2>Technical Screener</h2>
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Automated market scanning for high-probability setups</p>
                        </div>
                        <div class="market-badge">
                            <i class="fas fa-robot"></i> AI POWERED
                        </div>
                    </div>

                    <div class="tab-nav">
                        <button class="tab-btn active" data-type="macd">MACD Signals</button>
                        <button class="tab-btn" data-type="rsi">RSI Levels</button>
                        <button class="tab-btn" data-type="bollinger">Bollinger Bands</button>
                    </div>

                    <style>
                        .development-overlay {
                            position: absolute;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            background: rgba(15, 23, 42, 0.4);
                            backdrop-filter: blur(12px);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            z-index: 100;
                            border-radius: 24px;
                            border: 1px solid rgba(255, 255, 255, 0.1);
                        }
                        .overlay-content {
                            text-align: center;
                            padding: 3rem;
                            max-width: 400px;
                            border-radius: 24px;
                            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                        }
                        .overlay-content h3 {
                            font-size: 1.75rem;
                            font-weight: 800;
                            margin-bottom: 1rem;
                            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                        }
                        .overlay-content p {
                            color: var(--text-secondary);
                            margin-bottom: 2rem;
                            line-height: 1.6;
                        }
                    </style>
                    <div style="position: relative; min-height: 500px;">
                        <div id="screener-content" class="screener-grid" style="filter: blur(4px); pointer-events: none;">
                            <!-- Content loaded via JS -->
                        </div>
                        <div class="development-overlay">
                            <div class="glass overlay-content fade-in">
                                <div class="nepse-spinner-container" style="width: 80px; height: 80px; margin: 0 auto 1.5rem;">
                                    <div class="ring ring-blue"></div>
                                    <div class="ring ring-green"></div>
                                    <i class="fas fa-tools" style="font-size: 1.5rem; color: var(--primary);"></i>
                                </div>
                                <h3>Under Development</h3>
                                <p>Our AI-powered technical analysis engine is currently undergoing maintenance and optimization to ensure the highest accuracy for your trades.</p>
                                <button class="btn btn-primary" onclick="window.location.href='../../index.html'" style="width: 100%;">
                                    <i class="fas fa-arrow-left"></i> Return to Market
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../../js/pages/market/screener.js"></script>
</body>
</html>
