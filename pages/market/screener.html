<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Screener | NEPSE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/themes.css">
    <link rel="stylesheet" href="../../css/pages/screener.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="app">
                <div class="fade-in">
                    <div class="section-header">
                        <div>
                            <h2>Technical Screener</h2>
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Automated market scanning for high-probability setups</p>
                        </div>
                        <div class="market-badge">
                            <i class="fas fa-robot"></i> AI POWERED
                        </div>
                    </div>

                    <div class="tab-nav">
                        <button class="tab-btn active" data-type="macd">MACD Signals</button>
                        <button class="tab-btn" data-type="rsi">RSI Levels</button>
                        <button class="tab-btn" data-type="bollinger">Bollinger Bands</button>
                    </div>

                    <div style="position: relative; min-height: 500px;">
                        <div id="screener-content" class="screener-grid">
                            <!-- Content loaded via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../../js/pages/market/screener.js"></script>
</body>
</html>
