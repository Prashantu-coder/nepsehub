<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Market | NEPSE HUB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages/market.css" />
  <link rel="stylesheet" href="../../css/pages/live.css" />
  <link rel="stylesheet" href="../../css/easy.css" />
</head>

<body>
  <header class="sticky">
    <div class="flex-row space-between w-full">
      <!-- logo -->
      <div class="flex items-center gap-24">
        <div id="burgerMenu" class="burger-menu">
          <i class="fas fa-bars"></i>
        </div>

        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <span class="logo-text mobile-hide">NEPSE HUB</span>
        </div>
      </div>

      <!-- nepse values -->
      <div class="flex-row content-center items-center gap-5">
        <div id="marketDot" class="blinking-dot"></div>
        <div>
          <h6 class="nepse">NEPSE</h6>
        </div>
        <div id="index-value">
          <div class="flex-col">
            <span id="header-nepse-val" class="font-weight-700 f-16 text-primary">—</span>
            <span id="header-nepse-change" class="f-12 font-weight-600 mr-8">—</span>
          </div>
          <span class="pc-only bg-secondary w-1 h-12"></span>
          <div class="flex-col">
            <span class="pc-only f-16 text-secondary">Turnover:
              <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
            <span class="pc-only f-16 text-secondary">Volume:
              <strong id="header-nepse-volume" class="text-primary">—</strong></span>
          </div>
        </div>
      </div>

      <!-- clock and notification -->
      <div class="flex gap-5 py-8 pr-16">
        <!-- Combined Market Status & Clock Pill -->
        <div class="market-status-pill pc-only">
          <div id="navbar-clock" class="navbar-clock-sub"></div>
          <div id="market-status" class="market-status-sub"></div>
        </div>

        <!-- Notification Bell -->
        <div class="nav-notification-wrapper">
          <button
            id="notification-bell"
            class="btn-icon"
          >
            <i class="far fa-bell"></i>
            <span
              id="notif-badge"
              class="notif-badge hidden"
            >0</span>
          </button>
          <div
            id="notif-dropdown"
            class="notif-dropdown glass hidden"
          >
            <div class="notif-header">
              <h5>Notifications</h5>
              <div class="flex items-center gap-8">
                <button
                  id="sound-toggle-btn"
                  class="sound-toggle"
                  title="Toggle alert sound"
                >
                  <i class="fas fa-volume-up"></i>
                </button>
                <button id="mark-read-btn">Mark all as read</button>
              </div>
            </div>
            <div class="notif-filters">
              <button
                class="notif-filter-btn active"
                data-filter="all"
              >
                All
              </button>
              <button
                class="notif-filter-btn"
                data-filter="buy"
              >
                Buy Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="sell"
              >
                Sell Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="stoploss"
              >
                Stop Loss
              </button>
            </div>
            <div
              id="notif-list"
              class="notif-list">
              <div class="notif-empty">
                No notifications in the last 7 days
              </div>
            </div>
          </div>
        </div>

        <div class="nav-profile-wrapper">
          <button id="user-profile-btn" title="View Profile">
            <span id="user-avatar-initial">U</span>
          </button>
          <div id="profile-dropdown" class="profile-dropdown glass hidden">
            <div class="profile-header">
              <div class="profile-avatar-large">U</div>
              <div class="profile-meta">
                <h5>User</h5>
                <span>Code: </span>
              </div>
            </div>
            <div class="profile-body">
              <div class="profile-info-item">
                <i class="fas fa-envelope"></i>
                <span></span>
              </div>
            </div>
            <div class="profile-footer">
              <button id="notif-settings-btn" class="flex justify-center items-center gap-8 px-12 py-9 w-full rounded-10 f-13 font-weight-600 cursor-pointer mb-8" style="
                    background: rgba(99, 102, 241, 0.08);
                    border: 1px solid rgba(99, 102, 241, 0.2);
                    color: #a5b4fc;
                    transition: all 0.2s;
                  ">
                <i class="fas fa-bell f-12"></i>
                Notification Settings
              </button>
              <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <div id="navbar-container"></div>
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="app">
        <!-- New Live Market Header -->
        <div class="live-market-header">
          <div class="summary-badges">
            <button class="badge badge-advances" id="filterAdvances">
              Advances: <span id="advancesCount">0</span>
            </button>
            <button class="badge badge-declines" id="filterDeclines">
              Declines: <span id="declinesCount">0</span>
            </button>
            <button class="badge badge-neutral" id="filterNeutral">
              Neutral: <span id="neutralCount">0</span>
            </button>
          </div>

          <h1 class="live-market-title status-dot-indicator-head">
            <span id="marketStatusDot" class="status-dot-indicator status-dot-closed"></span>Live Market
          </h1>

          <div class="live-market-timestamp" id="liveTimestamp">
            As of: --/--/---- --:-- --
          </div>
        </div>

        <!-- New Filter and Search Bar -->
        <div class="filter-bar">
          <div class="filter-group">
            <select id="sectorFilter" class="filter-dropdown">
              <option value="all">All Sectors</option>
              <option value="Commercial Banks">Commercial Banks</option>
              <option value="Development Banks">Development Banks</option>
              <option value="Finance">Finance</option>
              <option value="Hotel & Tourism">Hotel & Tourism</option>
              <option value="Hydro Power">Hydro Power</option>
              <option value="Life Insurance">Life Insurance</option>
              <option value="Non-Life Insurance">Non-Life Insurance</option>
              <option value="Microfinance">Microfinance</option>
              <option value="Manufacturing & Processing">
                Manufacturing & Processing
              </option>
              <option value="Trading">Trading</option>
              <option value="Investment">Investment</option>
              <option value="Others">Others</option>
            </select>
            <input type="text" id="marketSearch" class="filter-search" placeholder="Enter symbol to search..." />
            <button id="searchBtn" class="btn-search">
              <i class="fas fa-search"></i> Search
            </button>
            <button id="clearBtn" class="btn-clear">
              <i class="fas fa-undo"></i> Clear
            </button>
          </div>
        </div>

        <div class="glass" style="padding: 0.8rem 0; border-radius: 12px; margin-top: 0.75rem">
          <div style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.3rem;
                padding: 0 1.5rem;
                gap: 1rem;
              ">
            <div></div>
            <div style="display: flex; gap: 1rem; align-items: center">
              <div id="marketSummary" style="font-size: 0.9rem; color: var(--text-secondary)">
                Showing <span id="filteredCount">0</span> of
                <span id="totalCount">0</span> stocks
              </div>
              <div style="position: relative">
                <button id="columnSettingsBtn" class="btn btn-secondary btn-sm" title="Customize Columns">
                  <i class="fas fa-columns"></i>
                </button>
                <div id="columnSettingsPopup" class="column-settings">
                  <h4 style="margin-bottom: 0.8rem; font-size: 0.9rem">
                    Show Columns
                  </h4>
                  <label class="column-option"><input type="checkbox" data-col="symbol" checked disabled />
                    SYMBOL</label>
                  <label class="column-option"><input type="checkbox" data-col="price" checked />
                    LTP</label>
                  <label class="column-option"><input type="checkbox" data-col="ltq" checked />
                    LTV</label>
                  <label class="column-option"><input type="checkbox" data-col="change" checked /> POINT
                    CHANGE</label>
                  <label class="column-option"><input type="checkbox" data-col="changePercent" checked />
                    %CHANGE</label>
                  <label class="column-option"><input type="checkbox" data-col="open" checked />
                    OPEN</label>
                  <label class="column-option"><input type="checkbox" data-col="high" checked />
                    HIGH</label>
                  <label class="column-option"><input type="checkbox" data-col="low" checked />
                    LOW</label>
                  <label class="column-option"><input type="checkbox" data-col="previousClose" checked />
                    PREV CLOSE</label>
                  <label class="column-option"><input type="checkbox" data-col="volume" checked />
                    VOLUME</label>
                  <label class="column-option"><input type="checkbox" data-col="turnover" checked />
                    TURNOVER</label>
                </div>
              </div>
            </div>
          </div>

          <div class="market-table-container">
            <table class="market-table">
              <thead>
                <tr>
                  <th class="sortable" data-sort="symbol">SYMBOL</th>
                  <th class="sortable" data-sort="price">LTP</th>
                  <th class="sortable" data-sort="ltq">LTV</th>
                  <th class="sortable" data-sort="change">POINT CHANGE</th>
                  <th class="sortable" data-sort="changePercent">%CHANGE</th>
                  <th class="sortable" data-sort="open">OPEN</th>
                  <th class="sortable" data-sort="high">HIGH</th>
                  <th class="sortable" data-sort="low">LOW</th>
                  <th class="sortable" data-sort="previousClose">
                    PREV CLOSE
                  </th>
                  <th class="sortable" data-sort="volume">VOLUME</th>
                  <th class="sortable" data-sort="turnover">TURNOVER</th>
                </tr>
              </thead>
              <tbody id="marketBody">
                <!-- Data injected here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Quick Action Side Panel -->
  <div class="side-panel-overlay" id="panelOverlay"></div>
  <div class="side-panel" id="quickPanel">
    <div class="close-panel" id="closePanel">
      <i class="fas fa-times"></i>
    </div>
    <div id="panelContent">
      <!-- Content injected dynamically -->
    </div>
  </div>

  <script type="module" src="../../js/pages/market/live.js"></script>
  <script src="../../js/security.js"></script>
</body>

</html>
