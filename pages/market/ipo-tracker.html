<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Opportunities | NEPSE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <link rel="stylesheet" href="../../css/pages/ipo-tracker.css" />
</head>
<body>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="app">
                <div class="fade-in">
                    <div class="page-header">
                        <div>
                            <h2 class="page-title"><i class="fas fa-rocket" style="margin-right: 0.75rem;"></i>Investment Opportunities</h2>
                        </div>
                        <div class="live-dot">
                            <span class="live-dot-circle"></span> LIVE UPDATES
                        </div>
                    </div>

                    <!-- Offering Type Sub-Nav -->
                    <div class="offering-type-tabs" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; background: rgba(15, 23, 42, 0.4); padding: 0.4rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                        <button class="offering-tab-btn active" data-type="ipo/general" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">General IPO</button>
                        <button class="offering-tab-btn" data-type="ipo/local" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Local IPO</button>
                        <button class="offering-tab-btn" data-type="ipo/foreign" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Foreign Employed</button>
                        <button class="offering-tab-btn" data-type="right-share" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Right Share</button>
                        <button class="offering-tab-btn" data-type="fpo" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">FPO</button>
                        <button class="offering-tab-btn" data-type="mutual-fund-offering" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Mutual Fund</button>
                        <button class="offering-tab-btn" data-type="debenture-offering" style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Debentures</button>
                    </div>

                    <div class="filter-tabs">
                        <button class="tab-btn active" data-status="all">All Offerings</button>
                        <button class="tab-btn" data-status="Open">Ongoing</button>
                        <button class="tab-btn" data-status="ComingSoon">Upcoming</button>
                        <button class="tab-btn" data-status="Closed">Closed</button>
                    </div>

                    <div id="ipo-list" class="ipo-grid">
                        <!-- IPO Cards will be injected here -->
                        <div class="loading-placeholder" style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem; display: block;"></i>
                            <p>Fetching latest IPO information...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination" style="display: flex; justify-content: center; gap: 1rem; margin-top: 3rem; margin-bottom: 2rem;">
                        <button class="btn btn-secondary" id="prev-page" disabled>Previous</button>
                        <span id="page-info" style="display: flex; align-items: center; font-weight: 600; color: var(--text-secondary);">Page 1 of 1</span>
                        <button class="btn btn-secondary" id="next-page" disabled>Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../../js/pages/market/ipo-tracker.js"></script>
</body>
</html>
