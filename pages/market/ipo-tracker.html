<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Opportunities | NEPSE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <link rel="stylesheet" href="../../css/pages/ipo-tracker.css" />
    <link rel="stylesheet" href="../../css/easy.css"/>
</head>

<body>
    <header class="sticky">
        <div style="display: flex; flex-direction: row; justify-content: space-between; width: 100%;">
            <!-- logo -->
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div id="burgerMenu" class="burger-menu">
                    <i class="fas fa-bars"></i>
                </div>

                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span class="logo-text">NEPSE HUB</span>
                </div>
            </div>

            <!-- nepse values -->
            <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 6px;">
                <div id="marketDot" class="blinking-dot"></div>
                <div>
                    <h6 class="nepse">NEPSE</h6>
                </div>
                <div id="index-value">
                    <div class="flex-col">
                        <span id="header-nepse-val" style="font-weight: 700; font-size: 1rem; color: var(--text-primary);">—</span>
                        <span id="header-nepse-change" style="font-size: 0.78rem; font-weight: 600; margin-right: 0.5rem;">—</span>
                    </div>
                    <span class="pc-only" style="height: 12px; width: 1px; background: rgba(255, 255, 255, 0.15);"></span>
                    <div class="flex-col">
                            <span class="pc-only font-1rem text-secondary">Turnover: <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
                        <span class="pc-only font-1rem text-secondary">Volume: <strong id="header-nepse-volume" class="text-primary">—</strong></span>
                    </div>
                </div>
            </div>

            <!-- clock and notification -->
            <div style="display: flex; gap: 5px; padding: 0.5rem 0rem; padding-right: 1rem;">
                <!-- Combined Market Status & Clock Pill -->
                <div class="market-status-pill pc-only">
                    <div id="navbar-clock" class="navbar-clock-sub"></div>
                    <div id="market-status" class="market-status-sub"></div>
                </div>

                <!-- Notification Bell -->
                <div class="nav-notification-wrapper">
                    <button id="notification-bell" class="btn-icon">
                        <i class="far fa-bell"></i>
                        <span id="notif-badge" class="notif-badge hidden">0</span>
                    </button>
                    <div id="notif-dropdown" class="notif-dropdown glass hidden">
                        <div class="notif-header">
                            <h5>Notifications</h5>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <button id="sound-toggle-btn" class="sound-toggle" title="Toggle alert sound">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button id="mark-read-btn">Mark all as read</button>
                            </div>
                        </div>
                        <div class="notif-filters">
                            <button class="notif-filter-btn active" data-filter="all">All</button>
                            <button class="notif-filter-btn" data-filter="buy">Buy Signals</button>
                            <button class="notif-filter-btn" data-filter="sell">Sell Signals</button>
                            <button class="notif-filter-btn" data-filter="stoploss">Stop Loss</button>
                        </div>
                        <div id="notif-list" class="notif-list">
                            <div class="notif-empty">No notifications in the last 7 days</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="app">
                <div class="fade-in">
                    <div class="page-header">
                        <div>
                            <h2 class="page-title"><i class="fas fa-rocket"
                                    style="margin-right: 0.75rem;"></i>Investment Opportunities</h2>
                        </div>
                        <div class="live-dot">
                            <span class="live-dot-circle"></span> LIVE UPDATES
                        </div>
                    </div>

                    <!-- Offering Type Sub-Nav -->
                    <div class="offering-type-tabs"
                        style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; background: rgba(15, 23, 42, 0.4); padding: 0.4rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                        <button class="offering-tab-btn active" data-type="ipo/general"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">General
                            IPO</button>
                        <button class="offering-tab-btn" data-type="ipo/local"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Local
                            IPO</button>
                        <button class="offering-tab-btn" data-type="ipo/foreign"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Foreign
                            Employed</button>
                        <button class="offering-tab-btn" data-type="right-share"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Right
                            Share</button>
                        <button class="offering-tab-btn" data-type="fpo"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">FPO</button>
                        <button class="offering-tab-btn" data-type="mutual-fund-offering"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Mutual
                            Fund</button>
                        <button class="offering-tab-btn" data-type="debenture-offering"
                            style="background:none; border:none; color:var(--text-secondary); padding:0.6rem 1.2rem; font-size:0.85rem; font-weight:700; cursor:pointer; border-radius:12px; transition:all 0.25s;">Debentures</button>
                    </div>

                    <div class="filter-tabs">
                        <button class="tab-btn active" data-status="all">All Offerings</button>
                        <button class="tab-btn" data-status="Open">Ongoing</button>
                        <button class="tab-btn" data-status="ComingSoon">Upcoming</button>
                        <button class="tab-btn" data-status="Closed">Closed</button>
                    </div>

                    <div id="ipo-list" class="ipo-grid">
                        <!-- IPO Cards will be injected here -->
                        <div class="loading-placeholder" style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                            <i class="fas fa-spinner fa-spin"
                                style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem; display: block;"></i>
                            <p>Fetching latest IPO information...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination"
                        style="display: flex; justify-content: center; gap: 1rem; margin-top: 3rem; margin-bottom: 2rem;">
                        <button class="btn btn-secondary" id="prev-page" disabled>Previous</button>
                        <span id="page-info"
                            style="display: flex; align-items: center; font-weight: 600; color: var(--text-secondary);">Page
                            1 of 1</span>
                        <button class="btn btn-secondary" id="next-page" disabled>Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../../js/pages/market/ipo-tracker.js"></script>
</body>

</html>
