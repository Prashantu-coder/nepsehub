<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Heatmap | NEPSE HUB</title>
  <script src="../../js/session-validator-8f7b2c9d6e4a3b1c.js"></script>
  <meta name="description" content="Visual market heatmap showing NEPSE stock performance by sector." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/analysis/all.css" />
  <link rel="stylesheet" href="../../css/easy.css" />
</head>

<body>
  <header class="sticky">
    <div class="flex-row space-between w-full px-5">
      <!-- logo -->
      <div class="flex items-center gap-15">
        <div id="burgerMenu" class="burger-menu">
          <i class="fas fa-bars"></i>
        </div>

        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <span class="logo-text mobile-hide">NEPSE HUB</span>
        </div>
      </div>

      <!-- nepse values -->
      <div class="flex-row content-center items-center gap-5">
        <div id="marketDot" class="blinking-dot"></div>
        <div>
          <h6 class="nepse">NEPSE</h6>
        </div>
        <div id="index-value">
          <div class="flex-col">
            <span id="header-nepse-val" class="font-weight-700 f-16 text-primary">—</span>
            <span id="header-nepse-change" class="f-12 font-weight-600 mr-8">—</span>
          </div>
          <span class="pc-only bg-secondary w-1 h-12"></span>
          <div class="flex-col">
            <span class="pc-only f-16 text-secondary">Turnover:
              <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
            <span class="pc-only f-16 text-secondary">Volume:
              <strong id="header-nepse-volume" class="text-primary">—</strong></span>
          </div>
        </div>
      </div>

      <!-- clock and notification -->
      <div class="flex gap-5 py-8 pr-10">
        <!-- Combined Market Status & Clock Pill -->
        <div class="market-status-pill pc-only">
          <div id="navbar-clock" class="navbar-clock-sub"></div>
          <div id="market-status" class="market-status-sub"></div>
        </div>

        <!-- Notification Bell -->
        <div class="nav-notification-wrapper">
          <button
            id="notification-bell"
            class="btn-icon"
          >
            <i class="far fa-bell"></i>
            <span
              id="notif-badge"
              class="notif-badge hidden"
            >0</span>
          </button>
          <div
            id="notif-dropdown"
            class="notif-dropdown glass hidden"
          >
            <div class="notif-header">
              <h5>Notifications</h5>
              <div class="flex items-center gap-8">
                <button
                  id="sound-toggle-btn"
                  class="sound-toggle"
                  title="Toggle alert sound"
                >
                  <i class="fas fa-volume-up"></i>
                </button>
                <button id="mark-read-btn">Mark all as read</button>
              </div>
            </div>
            <div class="notif-filters">
              <button
                class="notif-filter-btn active"
                data-filter="all"
              >
                All
              </button>
              <button
                class="notif-filter-btn"
                data-filter="buy"
              >
                Buy Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="sell"
              >
                Sell Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="stoploss"
              >
                Stop Loss
              </button>
            </div>
            <div
              id="notif-list"
              class="notif-list">
              <div class="notif-empty">
                No notifications in the last 7 days
              </div>
            </div>
          </div>
        </div>

        <div class="nav-profile-wrapper">
          <button id="user-profile-btn" title="View Profile">
            <span id="user-avatar-initial">U</span>
          </button>
          <div id="profile-dropdown" class="profile-dropdown glass hidden">
            <div class="profile-header">
              <div class="profile-avatar-large">U</div>
              <div class="profile-meta">
                <h5>User</h5>
                <span>Code: </span>
              </div>
            </div>
            <div class="profile-body">
              <div class="profile-info-item">
                <i class="fas fa-envelope"></i>
                <span></span>
              </div>
            </div>
            <div class="profile-footer">
              <button id="notif-settings-btn" class="flex justify-center items-center gap-8 px-12 py-9 w-full rounded-10 f-13 font-weight-600 cursor-pointer mb-8" style="
                    background: rgba(99, 102, 241, 0.08);
                    border: 1px solid rgba(99, 102, 241, 0.2);
                    color: #a5b4fc;
                    transition: all 0.2s;
                  ">
                <i class="fas fa-bell f-12"></i>
                Notification Settings
              </button>
              <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="navbar-container"></div>
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content" style="padding: 1rem 1.5rem">
      <div id="app">
        <!-- Toolbar -->
        <div class="heatmap-toolbar">
          <div class="toolbar-left">
            <select id="sector-filter" class="sector-dropdown glass">
              <option value="all">All Sectors</option>
            </select>
          </div>
          <div class="toolbar-right">
            <span class="hm-info-text">Block size is indicative of turnover</span>
          </div>
        </div>

        <!-- Treemap -->
        <div id="treemap-wrapper" class="treemap-wrapper">
          <div class="heatmap-loading" id="heatmap-loading">
            <div class="nepse-spinner-container" style="width: 60px; height: 60px">
              <div class="ring ring-blue"></div>
              <div class="ring ring-green"></div>
            </div>
            <p>Loading market data...</p>
          </div>
        </div>

        <!-- Legend (bottom) -->
        <div class="heatmap-legend-bar">
          <div class="lg-stop" style="background: #7f1d1d">-5%</div>
          <div class="lg-stop" style="background: #991b1b">-3%</div>
          <div class="lg-stop" style="background: #b91c1c">-1%</div>
          <div class="lg-stop" style="background: #374151">0%</div>
          <div class="lg-stop" style="background: #166534">+1%</div>
          <div class="lg-stop" style="background: #15803d">+3%</div>
          <div class="lg-stop" style="background: #16a34a">+5%</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../../js/pages/analysis/heatmap.js"></script>
  <script src="../../js/security.js"></script>
</body>

</html>
