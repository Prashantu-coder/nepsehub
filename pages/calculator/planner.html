<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Planner | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <link rel="stylesheet" href="../../css/easy.css" />
  </head>
  <body>
    <header class="sticky">
      <div
        style="
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          width: 100%;
        "
      >
        <!-- logo -->
        <div style="display: flex; align-items: center; gap: 1.5rem">
          <div id="burgerMenu" class="burger-menu">
            <i class="fas fa-bars"></i>
          </div>

          <div class="logo">
            <i class="fas fa-chart-line"></i>
            <span class="logo-text">NEPSE HUB</span>
          </div>
        </div>

        <!-- nepse values -->
        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 6px;
          "
        >
          <div id="marketDot" class="blinking-dot"></div>
          <div>
            <h6 class="nepse">NEPSE</h6>
          </div>
          <div id="index-value">
            <div class="flex-col">
              <span
                id="header-nepse-val"
                style="
                  font-weight: 700;
                  font-size: 1rem;
                  color: var(--text-primary);
                "
                >—</span
              >
              <span
                id="header-nepse-change"
                style="
                  font-size: 0.78rem;
                  font-weight: 600;
                  margin-right: 0.5rem;
                "
                >—</span
              >
            </div>
            <span
              class="pc-only"
              style="
                height: 12px;
                width: 1px;
                background: rgba(255, 255, 255, 0.15);
              "
            ></span>
            <div class="flex-col">
              <span class="pc-only font-1rem text-secondary"
                >Turnover:
                <strong id="header-nepse-turnover" class="text-primary"
                  >—</strong
                ></span
              >
              <span class="pc-only font-1rem text-secondary"
                >Volume:
                <strong id="header-nepse-volume" class="text-primary"
                  >—</strong
                ></span
              >
            </div>
          </div>
        </div>

        <!-- clock and notification -->
        <div
          style="
            display: flex;
            gap: 5px;
            padding: 0.5rem 0rem;
            padding-right: 1rem;
          "
        >
          <!-- Combined Market Status & Clock Pill -->
          <div class="market-status-pill pc-only">
            <div id="navbar-clock" class="navbar-clock-sub"></div>
            <div id="market-status" class="market-status-sub"></div>
          </div>

          <!-- Notification Bell -->
          <div class="nav-notification-wrapper">
            <button id="notification-bell" class="btn-icon">
              <i class="far fa-bell"></i>
              <span id="notif-badge" class="notif-badge hidden">0</span>
            </button>
            <div id="notif-dropdown" class="notif-dropdown glass hidden">
              <div class="notif-header">
                <h5>Notifications</h5>
                <div style="display: flex; align-items: center; gap: 0.5rem">
                  <button
                    id="sound-toggle-btn"
                    class="sound-toggle"
                    title="Toggle alert sound"
                  >
                    <i class="fas fa-volume-up"></i>
                  </button>
                  <button id="mark-read-btn">Mark all as read</button>
                </div>
              </div>
              <div class="notif-filters">
                <button class="notif-filter-btn active" data-filter="all">
                  All
                </button>
                <button class="notif-filter-btn" data-filter="buy">
                  Buy Signals
                </button>
                <button class="notif-filter-btn" data-filter="sell">
                  Sell Signals
                </button>
                <button class="notif-filter-btn" data-filter="stoploss">
                  Stop Loss
                </button>
              </div>
              <div id="notif-list" class="notif-list">
                <div class="notif-empty">
                  No notifications in the last 7 days
                </div>
              </div>
            </div>
          </div>

          <div class="nav-profile-wrapper">
                <button id="user-profile-btn" title="View Profile">
                    <span id="user-avatar-initial">U</span>
                </button>
                <div id="profile-dropdown" class="profile-dropdown glass hidden">
                    <div class="profile-header">
                        <div class="profile-avatar-large">U</div>
                        <div class="profile-meta">
                            <h5>User</h5>
                            <span>Code: </span>
                        </div>
                    </div>
                    <div class="profile-body">
                        <div class="profile-info-item">
                            <i class="fas fa-envelope"></i>
                            <span></span>
                        </div>
                    </div>
                    <div class="profile-footer">
                        <button id="logout-btn" class="btn-logout">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </header>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Trade Planner & Approval System</h2>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Input Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-edit"></i>
                  </div>
                  <h3 style="font-weight: 700">Setup Parameters</h3>
                </div>

                <div class="form-group">
                  <label>Stock Symbol / Name</label>
                  <input
                    type="text"
                    id="stockName"
                    list="stockList"
                    placeholder="Search e.g. NICA..."
                    value=""
                  />
                  <datalist id="stockList"></datalist>
                </div>

                <div
                  style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                  "
                >
                  <div class="form-group">
                    <label>Entry Price (NPR)</label>
                    <input
                      type="number"
                      id="entryPrice"
                      placeholder="500"
                      value=""
                    />
                  </div>
                  <div class="form-group">
                    <label>Stop Loss (NPR)</label>
                    <input
                      type="number"
                      id="stopLoss"
                      placeholder="480"
                      value=""
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label>Target Price (NPR)</label>
                  <input
                    type="number"
                    id="targetPrice"
                    placeholder="550"
                    value=""
                  />
                </div>

                <div
                  class="form-group"
                  style="
                    margin-top: 1.5rem;
                    padding-top: 1.5rem;
                    border-top: 1px solid var(--surface-border);
                  "
                >
                  <label>Total Trading Capital (NPR)</label>
                  <inputW
                    type="number"
                    id="capital"
                    placeholder="100000"
                    value=""
                  />
                </div>

                <div
                  style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                  "
                >
                  <div class="form-group">
                    <label>Risk Mode</label>
                    <select id="riskMode">
                      <option value="percent">Percentage (%)</option>
                      <option value="fixed">Fixed NPR</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label id="riskLabel">Risk Amount</label>
                    <input
                      type="number"
                      id="riskValue"
                      placeholder="1"
                      value="1"
                      step="0.1"
                    />
                  </div>
                </div>
              </div>

              <!-- Result Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-check-double"></i>
                  </div>
                  <h3 style="font-weight: 700">Approval Results</h3>
                </div>

                <div id="plannerResults" class="calculator-results">
                  <!-- Results here -->
                </div>

                <div
                  id="decisionBadge"
                  style="
                    margin-top: 2rem;
                    padding: 1.5rem;
                    border-radius: 16px;
                    text-align: center;
                    font-weight: 800;
                    font-size: 1.25rem;
                    text-transform: uppercase;
                    letter-spacing: 1px;
                  "
                >
                  <!-- Decision here -->
                </div>

                <div
                  id="warningArea"
                  style="
                    margin-top: 1rem;
                    color: var(--danger);
                    font-size: 0.85rem;
                    text-align: center;
                  "
                ></div>

                <div style="margin-top: 2rem;">
                  <button id="savePlanBtn" class="btn btn-primary" style="width: 100%; padding: 1rem;" disabled>
                    <i class="fas fa-save"></i> Save Trade Plan
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/trade/planner.js"></script>
    </script>
  </body>
</html>
