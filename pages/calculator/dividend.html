<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividend Yield Calculator | NEPSE HUB</title>
  <script src="../../js/session-validator-8f7b2c9d6e4a3b1c.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/easy.css" />
  <style>
    .split-bar {
      height: 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      margin: 1.5rem 0;
    }

    .income-segment {
      background: var(--secondary);
      height: 100%;
      transition: width 0.5s ease;
    }

    .growth-segment {
      background: var(--primary);
      height: 100%;
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>
  <header class="sticky">
    <div class="flex-row space-between w-full px-5">
      <!-- logo -->
      <div class="flex items-center gap-15">
        <div id="burgerMenu" class="burger-menu">
          <i class="fas fa-bars"></i>
        </div>

        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <span class="logo-text mobile-hide">NEPSE HUB</span>
        </div>
      </div>

      <!-- nepse values -->
      <div class="flex-row content-center items-center gap-5">
        <div id="marketDot" class="blinking-dot"></div>
        <div>
          <h6 class="nepse">NEPSE</h6>
        </div>
        <div id="index-value">
          <div class="flex-col">
            <span id="header-nepse-val" class="font-weight-700 f-16 text-primary">—</span>
            <span id="header-nepse-change" class="f-12 font-weight-600 mr-8">—</span>
          </div>
          <span class="pc-only bg-secondary w-1 h-12"></span>
          <div class="flex-col">
            <span class="pc-only f-16 text-secondary">Turnover:
              <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
            <span class="pc-only f-16 text-secondary">Volume:
              <strong id="header-nepse-volume" class="text-primary">—</strong></span>
          </div>
        </div>
      </div>

      <!-- clock and notification -->
      <div class="flex gap-5 py-8 pr-10">
        <!-- Combined Market Status & Clock Pill -->
        <div class="market-status-pill pc-only">
          <div id="navbar-clock" class="navbar-clock-sub"></div>
          <div id="market-status" class="market-status-sub"></div>
        </div>

        <!-- Notification Bell -->
        <div class="nav-notification-wrapper">
          <button
            id="notification-bell"
            class="btn-icon"
          >
            <i class="far fa-bell"></i>
            <span
              id="notif-badge"
              class="notif-badge hidden"
            >0</span>
          </button>
          <div
            id="notif-dropdown"
            class="notif-dropdown glass hidden"
          >
            <div class="notif-header">
              <h5>Notifications</h5>
              <div class="flex items-center gap-8">
                <button
                  id="sound-toggle-btn"
                  class="sound-toggle"
                  title="Toggle alert sound"
                >
                  <i class="fas fa-volume-up"></i>
                </button>
                <button id="mark-read-btn">Mark all as read</button>
              </div>
            </div>
            <div class="notif-filters">
              <button
                class="notif-filter-btn active"
                data-filter="all"
              >
                All
              </button>
              <button
                class="notif-filter-btn"
                data-filter="buy"
              >
                Buy Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="sell"
              >
                Sell Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="stoploss"
              >
                Stop Loss
              </button>
            </div>
            <div
              id="notif-list"
              class="notif-list">
              <div class="notif-empty">
                No notifications in the last 7 days
              </div>
            </div>
          </div>
        </div>

        <div class="nav-profile-wrapper">
          <button id="user-profile-btn" title="View Profile">
            <span id="user-avatar-initial">U</span>
          </button>
          <div id="profile-dropdown" class="profile-dropdown glass hidden">
            <div class="profile-header">
              <div class="profile-avatar-large">U</div>
              <div class="profile-meta">
                <h5>User</h5>
                <span>Code: </span>
              </div>
            </div>
            <div class="profile-body">
              <div class="profile-info-item">
                <i class="fas fa-envelope"></i>
                <span></span>
              </div>
            </div>
            <div class="profile-footer">
              <button id="notif-settings-btn" class="flex justify-center items-center gap-8 px-12 py-9 w-full rounded-10 f-13 font-weight-600 cursor-pointer mb-8" style="
                    background: rgba(99, 102, 241, 0.08);
                    border: 1px solid rgba(99, 102, 241, 0.2);
                    color: #a5b4fc;
                    transition: all 0.2s;
                  ">
                <i class="fas fa-bell f-12"></i>
                Notification Settings
              </button>
              <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <div id="navbar-container"></div>
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="app">
        <div class="section-header">
          <h2>Dividend Yield & Total Return</h2>
        </div>

        <div class="tools-grid" style="
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
              gap: 1.5rem;
            ">
          <!-- Input Section -->
          <div class="glass" style="
                padding: 2rem;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.2);
              ">
            <div style="
                  display: flex;
                  align-items: center;
                  gap: 1rem;
                  margin-bottom: 2rem;
                ">
              <div style="
                    background: var(--secondary);
                    color: white;
                    width: 45px;
                    height: 45px;
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 1.2rem;
                  ">
                <i class="fas fa-hand-holding-usd"></i>
              </div>
              <h3 style="font-weight: 700">Stock Details</h3>
            </div>

            <div class="form-group">
              <label>Select Stock (Optional)</label>
              <input type="text" id="stockName" list="stockList" placeholder="Search e.g. NICA..." />
              <datalist id="stockList"></datalist>
            </div>

            <div class="form-group">
              <label>Current Market Price (NPR)</label>
              <input type="number" id="currentPrice" placeholder="e.g. 500" value="" />
            </div>

            <div class="form-group">
              <label>Annual Cash Dividend (NPR)</label>
              <input type="number" id="annualDividend" placeholder="e.g. 25" value="" />
            </div>

            <div class="form-group" style="
                  margin-top: 1.5rem;
                  padding-top: 1rem;
                  border-top: 1px solid var(--surface-border);
                ">
              <label>Your Buy Price (Optional)</label>
              <input type="number" id="buyPrice" placeholder="e.g. 400" />
            </div>
          </div>

          <!-- Result Section -->
          <div class="glass" style="
                padding: 2rem;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.2);
              ">
            <div style="
                  display: flex;
                  align-items: center;
                  gap: 1rem;
                  margin-bottom: 2rem;
                ">
              <div style="
                    background: var(--primary);
                    color: white;
                    width: 45px;
                    height: 45px;
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 1.2rem;
                  ">
                <i class="fas fa-chart-line"></i>
              </div>
              <h3 style="font-weight: 700">Return Analysis</h3>
            </div>

            <div id="divResults" class="calculator-results">
              <!-- Results here -->
            </div>

            <div id="returnSummary" style="margin-top: 1.5rem">
              <!-- Income vs Growth split here -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../../js/pages/calculator/dividend.js"></script>
  <script src="../../js/security.js"></script>
</body>

</html>
