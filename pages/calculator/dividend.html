<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dividend Yield Calculator | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <style>
      .split-bar {
        height: 12px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
        display: flex;
        margin: 1.5rem 0;
      }
      .income-segment {
        background: var(--secondary);
        height: 100%;
        transition: width 0.5s ease;
      }
      .growth-segment {
        background: var(--primary);
        height: 100%;
        transition: width 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Dividend Yield & Total Return</h2>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Input Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-hand-holding-usd"></i>
                  </div>
                  <h3 style="font-weight: 700">Stock Details</h3>
                </div>

                <div class="form-group">
                  <label>Select Stock (Optional)</label>
                  <input
                    type="text"
                    id="stockName"
                    list="stockList"
                    placeholder="Search e.g. NICA..."
                  />
                  <datalist id="stockList"></datalist>
                </div>

                <div class="form-group">
                  <label>Current Market Price (NPR)</label>
                  <input
                    type="number"
                    id="currentPrice"
                    placeholder="e.g. 500"
                    value=""
                  />
                </div>

                <div class="form-group">
                  <label>Annual Cash Dividend (NPR)</label>
                  <input
                    type="number"
                    id="annualDividend"
                    placeholder="e.g. 25"
                    value=""
                  />
                </div>

                <div
                  class="form-group"
                  style="
                    margin-top: 1.5rem;
                    padding-top: 1rem;
                    border-top: 1px solid var(--surface-border);
                  "
                >
                  <label>Your Buy Price (Optional)</label>
                  <input type="number" id="buyPrice" placeholder="e.g. 400" />
                </div>
              </div>

              <!-- Result Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-chart-line"></i>
                  </div>
                  <h3 style="font-weight: 700">Return Analysis</h3>
                </div>

                <div id="divResults" class="calculator-results">
                  <!-- Results here -->
                </div>

                <div id="returnSummary" style="margin-top: 1.5rem">
                  <!-- Income vs Growth split here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/calculator/dividend.js"></script>
    </script>
  </body>
</html>
