<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exit Strategy Planner | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <link rel="stylesheet" href="../../css/easy.css" />
    <style>
      .ladder-step {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
        position: relative;
      }
      .ladder-step::before {
        content: "";
        position: absolute;
        left: 20px;
        top: 40px;
        width: 2px;
        height: 30px;
        background: var(--surface-border);
      }
      .ladder-step:last-child::before {
        display: none;
      }
      .step-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--surface);
        border: 2px solid var(--surface-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        z-index: 1;
      }
      .step-content {
        flex: 1;
        padding: 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--surface-border);
      }
      .slider-group {
        margin-bottom: 2rem;
      }
      input[type="range"] {
        width: 100%;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header class="sticky">
        <div style="display: flex; flex-direction: row; justify-content: space-between; width: 100%;">
            <!-- logo -->
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div id="burgerMenu" class="burger-menu">
                    <i class="fas fa-bars"></i>
                </div>

                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span class="logo-text">NEPSE HUB</span>
                </div>
            </div>

            <!-- nepse values -->
            <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 6px;">
                <div id="marketDot" class="blinking-dot"></div>
                <div>
                    <h6 class="nepse">NEPSE</h6>
                </div>
                <div id="index-value">
                    <div class="flex-col">
                        <span id="header-nepse-val" style="font-weight: 700; font-size: 1rem; color: var(--text-primary);">—</span>
                        <span id="header-nepse-change" style="font-size: 0.78rem; font-weight: 600; margin-right: 0.5rem;">—</span>
                    </div>
                    <span class="pc-only" style="height: 12px; width: 1px; background: rgba(255, 255, 255, 0.15);"></span>
                    <div class="flex-col">
                            <span class="pc-only font-1rem text-secondary">Turnover: <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
                        <span class="pc-only font-1rem text-secondary">Volume: <strong id="header-nepse-volume" class="text-primary">—</strong></span>
                    </div>
                </div>
            </div>

            <!-- clock and notification -->
            <div style="display: flex; gap: 5px; padding: 0.5rem 0rem; padding-right: 1rem;">
                <!-- Combined Market Status & Clock Pill -->
                <div class="market-status-pill pc-only">
                    <div id="navbar-clock" class="navbar-clock-sub"></div>
                    <div id="market-status" class="market-status-sub"></div>
                </div>

                <!-- Notification Bell -->
                <div class="nav-notification-wrapper">
                    <button id="notification-bell" class="btn-icon">
                        <i class="far fa-bell"></i>
                        <span id="notif-badge" class="notif-badge hidden">0</span>
                    </button>
                    <div id="notif-dropdown" class="notif-dropdown glass hidden">
                        <div class="notif-header">
                            <h5>Notifications</h5>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <button id="sound-toggle-btn" class="sound-toggle" title="Toggle alert sound">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button id="mark-read-btn">Mark all as read</button>
                            </div>
                        </div>
                        <div class="notif-filters">
                            <button class="notif-filter-btn active" data-filter="all">All</button>
                            <button class="notif-filter-btn" data-filter="buy">Buy Signals</button>
                            <button class="notif-filter-btn" data-filter="sell">Sell Signals</button>
                            <button class="notif-filter-btn" data-filter="stoploss">Stop Loss</button>
                        </div>
                        <div id="notif-list" class="notif-list">
                            <div class="notif-empty">No notifications in the last 7 days</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Exit Strategy Planner</h2>
              <p style="color: var(--text-secondary)">
                Plan your profit ladder for disciplined execution
              </p>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Input Section -->
              <div class="glass" style="padding: 2rem; border-radius: 20px">
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-sign-out-alt"></i>
                  </div>
                  <h3 style="font-weight: 700">Setup & Allocation</h3>
                </div>

                <div
                  style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                  "
                >
                  <div class="form-group">
                    <label>Entry Price</label>
                    <input
                      type="number"
                      id="entryPrice"
                      placeholder="500"
                      value=""
                    />
                  </div>
                  <div class="form-group">
                    <label>Total Quantity</label>
                    <input
                      type="number"
                      id="totalQty"
                      placeholder="100"
                      value=""
                    />
                  </div>
                </div>

                <div class="form-group" style="margin-top: 1rem">
                  <label>Targets (T1 < T2 < T3)</label>
                  <div
                    style="
                      display: grid;
                      grid-template-columns: 1fr 1fr 1fr;
                      gap: 0.8rem;
                    "
                  >
                    <input
                      type="number"
                      id="target1"
                      placeholder="T1"
                      value=""
                    />
                    <input
                      type="number"
                      id="target2"
                      placeholder="T2"
                      value=""
                    />
                    <input
                      type="number"
                      id="target3"
                      placeholder="T3"
                      value=""
                    />
                  </div>
                </div>

                <div
                  style="
                    margin-top: 2rem;
                    padding-top: 1.5rem;
                    border-top: 1px solid var(--surface-border);
                  "
                >
                  <div class="slider-group">
                    <div style="display: flex; justify-content: space-between">
                      <label>Portion 1 (at T1)</label>
                      <span id="p1Val">40%</span>
                    </div>
                    <input
                      type="range"
                      id="p1Slider"
                      min="0"
                      max="100"
                      value="40"
                    />
                  </div>
                  <div class="slider-group">
                    <div style="display: flex; justify-content: space-between">
                      <label>Portion 2 (at T2)</label>
                      <span id="p2Val">30%</span>
                    </div>
                    <input
                      type="range"
                      id="p2Slider"
                      min="0"
                      max="100"
                      value="30"
                    />
                  </div>
                  <div class="slider-group">
                    <div style="display: flex; justify-content: space-between">
                      <label>Portion 3 (at T3)</label>
                      <span id="p3Val">30%</span>
                    </div>
                    <input
                      type="range"
                      id="p3Slider"
                      min="0"
                      max="100"
                      value="30"
                      disabled
                    />
                  </div>
                  <div
                    id="allocWarning"
                    style="
                      color: var(--danger);
                      font-size: 0.8rem;
                      text-align: center;
                    "
                  ></div>
                </div>
              </div>

              <!-- Result Section -->
              <div class="glass" style="padding: 2rem; border-radius: 20px">
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-layer-group"></i>
                  </div>
                  <h3 style="font-weight: 700">Profit Ladder</h3>
                </div>

                <div id="ladderContainer">
                  <!-- Ladder steps injected here -->
                </div>

                <div
                  id="summaryCard"
                  class="summary-card"
                  style="
                    background: rgba(255, 255, 255, 0.05);
                    padding: 1.5rem;
                    border-radius: 16px;
                    margin-top: 2rem;
                    border: 1px solid var(--surface-border);
                  "
                >
                  <!-- Summary here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import globalState from "../../js/state.js";
      import { Layout } from "../../js/layout.js";

      const ExitLogic = {
        updateSliders(sourceId) {
          let p1 = parseInt(document.getElementById("p1Slider").value);
          let p2 = parseInt(document.getElementById("p2Slider").value);

          if (p1 + p2 > 100) {
            if (sourceId === "p1Slider") p2 = 100 - p1;
            else p1 = 100 - p2;
          }

          const p3 = 100 - (p1 + p2);

          document.getElementById("p1Slider").value = p1;
          document.getElementById("p2Slider").value = p2;
          document.getElementById("p3Slider").value = p3;

          document.getElementById("p1Val").innerText = p1 + "%";
          document.getElementById("p2Val").innerText = p2 + "%";
          document.getElementById("p3Val").innerText = p3 + "%";

          this.calculate();
        },

        calculate() {
          const entry =
            parseFloat(document.getElementById("entryPrice").value) || 0;
          const qty =
            parseFloat(document.getElementById("totalQty").value) || 0;
          const t1 = parseFloat(document.getElementById("target1").value) || 0;
          const t2 = parseFloat(document.getElementById("target2").value) || 0;
          const t3 = parseFloat(document.getElementById("target3").value) || 0;

          const p1 = parseInt(document.getElementById("p1Slider").value) / 100;
          const p2 = parseInt(document.getElementById("p2Slider").value) / 100;
          const p3 = parseInt(document.getElementById("p3Slider").value) / 100;

          if (t1 >= t2 || t2 >= t3) {
            document.getElementById("allocWarning").innerText =
              "Ensure T1 < T2 < T3";
            this.renderEmpty();
            return;
          } else {
            document.getElementById("allocWarning").innerText = "";
          }

          if (entry <= 0 || qty <= 0) {
            this.renderEmpty();
            return;
          }

          const q1 = Math.round(qty * p1);
          const q2 = Math.round(qty * p2);
          const q3 = qty - (q1 + q2); // Ensure total matches

          const prof1 = (t1 - entry) * q1;
          const prof2 = (t2 - entry) * q2;
          const prof3 = (t3 - entry) * q3;

          const totalProfit = prof1 + prof2 + prof3;
          const totalProceeds = t1 * q1 + t2 * q2 + t3 * q3;
          const avgExitPrice = totalProceeds / qty;
          const overallReturn = ((avgExitPrice - entry) / entry) * 100;

          this.renderLadder([
            {
              label: "T1",
              price: t1,
              qty: q1,
              profit: prof1,
              color: "var(--secondary)",
            },
            {
              label: "T2",
              price: t2,
              qty: q2,
              profit: prof2,
              color: "var(--primary)",
            },
            {
              label: "T3",
              price: t3,
              qty: q3,
              profit: prof3,
              color: "#8b5cf6",
            },
          ]);

          document.getElementById("summaryCard").innerHTML = `
              <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                  <span style="color: var(--text-secondary);">Total Expected Profit</span>
                  <span style="font-weight: 700; color: var(--secondary); font-size: 1.1rem;">Rs. ${totalProfit.toLocaleString()}</span>
              </div>
              <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                  <span style="color: var(--text-secondary);">Average Exit Price</span>
                  <span style="font-weight: 600;">Rs. ${avgExitPrice.toFixed(2)}</span>
              </div>
              <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                  <span style="color: var(--text-secondary);">Overall Return</span>
                  <span style="font-weight: 700; color: var(--secondary);">${overallReturn.toFixed(2)}%</span>
              </div>
          `;
        },

        renderLadder(steps) {
          const container = document.getElementById("ladderContainer");
          container.innerHTML = steps
            .map(
              (step) => `
                <div class="ladder-step">
                    <div class="step-icon" style="color: ${step.color}; border-color: ${step.color}">${step.label}</div>
                    <div class="step-content">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Price: Rs. ${step.price}</div>
                                <div style="font-weight: 700;">${step.qty} Shares</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Profit Contribution</div>
                                <div style="font-weight: 700; color: var(--secondary);">+ Rs. ${step.profit.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            )
            .join("");
        },

        renderEmpty() {
          document.getElementById("ladderContainer").innerHTML = `
                <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                    <i class="fas fa-stairs" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Enter targets and allocation to visualize your exit strategy.</p>
                </div>
            `;
          document.getElementById("summaryCard").innerHTML = "";
        },
      };

      async function init() {
        globalState.setState({ activePage: "exit-strategy" });
        await Layout.init();

        const inputs = [
          "entryPrice",
          "totalQty",
          "target1",
          "target2",
          "target3",
        ];
        inputs.forEach((id) => {
          document
            .getElementById(id)
            .addEventListener("input", () => ExitLogic.calculate());
        });

        document
          .getElementById("p1Slider")
          .addEventListener("input", () => ExitLogic.updateSliders("p1Slider"));
        document
          .getElementById("p2Slider")
          .addEventListener("input", () => ExitLogic.updateSliders("p2Slider"));

        ExitLogic.calculate();
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
