<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Average Price Calculator (DCA) | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <style>
      .entry-row {
        display: grid;
        grid-template-columns: 2fr 2fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
        align-items: center;
      }
      .remove-btn {
        color: var(--danger);
        cursor: pointer;
        font-size: 1.2rem;
        transition: var(--transition-fast);
        text-align: center;
      }
      .remove-btn:hover {
        transform: scale(1.1);
      }
      .summary-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--surface-border);
        padding: 1.5rem;
        border-radius: 16px;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Average Price Calculator (DCA)</h2>
              <button id="addEntryBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Entry
              </button>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Entries Section -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-list"></i>
                  </div>
                  <h3 style="font-weight: 700">Buy Transactions</h3>
                </div>

                <div id="entries-container">
                  <div class="entry-row">
                    <div class="form-group" style="margin-bottom: 0">
                      <label style="font-size: 0.75rem">Price (NPR)</label>
                      <input
                        type="number"
                        class="buy-price"
                        placeholder="e.g. 100"
                        value=""
                      />
                    </div>
                    <div class="form-group" style="margin-bottom: 0">
                      <label style="font-size: 0.75rem">Quantity</label>
                      <input
                        type="number"
                        class="buy-qty"
                        placeholder="e.g. 10"
                        value=""
                      />
                    </div>
                    <div style="margin-top: 1.2rem"></div>
                  </div>
                </div>
              </div>

              <!-- Results Section -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-calculator"></i>
                  </div>
                  <h3 style="font-weight: 700">Weighted Summary</h3>
                </div>

                <div id="dcaResults" class="calculator-results">
                  <!-- Results injected here -->
                </div>

                <div
                  class="form-group"
                  style="
                    margin-top: 2rem;
                    border-top: 1px solid var(--surface-border);
                    padding-top: 1.5rem;
                  "
                >
                  <label>Current LTP (for Gain/Loss analysis)</label>
                  <input
                    type="number"
                    id="currentLtp"
                    placeholder="e.g. 550"
                    value=""
                  />
                </div>

                <div id="profitAnalysis" style="margin-top: 1rem">
                  <!-- Analysis injected here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/calculator/average.js"></script>
    </script>
  </body>
</html>
