<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Average Price Calculator (DCA) | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
    <link rel="stylesheet" href="../../css/easy.css">
    <style>
      .entry-row {
        display: grid;
        grid-template-columns: 2fr 2fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
        align-items: center;
      }
      .remove-btn {
        color: var(--danger);
        cursor: pointer;
        font-size: 1.2rem;
        transition: var(--transition-fast);
        text-align: center;
      }
      .remove-btn:hover {
        transform: scale(1.1);
      }
      .summary-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--surface-border);
        padding: 1.5rem;
        border-radius: 16px;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <header class="sticky">
      <div
        style="
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          width: 100%;
        "
      >
        <!-- logo -->
        <div style="display: flex; align-items: center; gap: 1.5rem">
          <div id="burgerMenu" class="burger-menu">
            <i class="fas fa-bars"></i>
          </div>

          <div class="logo">
            <i class="fas fa-chart-line"></i>
            <span class="logo-text">NEPSE HUB</span>
          </div>
        </div>

        <!-- nepse values -->
        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 6px;
          "
        >
          <div id="marketDot" class="blinking-dot"></div>
          <div>
            <h6 class="nepse">NEPSE</h6>
          </div>
          <div id="index-value">
            <div class="flex-col">
              <span
                id="header-nepse-val"
                style="
                  font-weight: 700;
                  font-size: 1rem;
                  color: var(--text-primary);
                "
                >—</span
              >
              <span
                id="header-nepse-change"
                style="
                  font-size: 0.78rem;
                  font-weight: 600;
                  margin-right: 0.5rem;
                "
                >—</span
              >
            </div>
            <span
              class="pc-only"
              style="
                height: 12px;
                width: 1px;
                background: rgba(255, 255, 255, 0.15);
              "
            ></span>
            <div class="flex-col">
              <span class="pc-only font-1rem text-secondary"
                >Turnover:
                <strong id="header-nepse-turnover" class="text-primary"
                  >—</strong
                ></span
              >
              <span class="pc-only font-1rem text-secondary"
                >Volume:
                <strong id="header-nepse-volume" class="text-primary"
                  >—</strong
                ></span
              >
            </div>
          </div>
        </div>

        <!-- clock and notification -->
        <div
          style="
            display: flex;
            gap: 5px;
            padding: 0.5rem 0rem;
            padding-right: 1rem;
          "
        >
          <!-- Combined Market Status & Clock Pill -->
          <div class="market-status-pill pc-only">
            <div id="navbar-clock" class="navbar-clock-sub"></div>
            <div id="market-status" class="market-status-sub"></div>
          </div>

          <!-- Notification Bell -->
          <div class="nav-notification-wrapper">
            <button id="notification-bell" class="btn-icon">
              <i class="far fa-bell"></i>
              <span id="notif-badge" class="notif-badge hidden">0</span>
            </button>
            <div id="notif-dropdown" class="notif-dropdown glass hidden">
              <div class="notif-header">
                <h5>Notifications</h5>
                <div style="display: flex; align-items: center; gap: 0.5rem">
                  <button
                    id="sound-toggle-btn"
                    class="sound-toggle"
                    title="Toggle alert sound"
                  >
                    <i class="fas fa-volume-up"></i>
                  </button>
                  <button id="mark-read-btn">Mark all as read</button>
                </div>
              </div>
              <div class="notif-filters">
                <button class="notif-filter-btn active" data-filter="all">
                  All
                </button>
                <button class="notif-filter-btn" data-filter="buy">
                  Buy Signals
                </button>
                <button class="notif-filter-btn" data-filter="sell">
                  Sell Signals
                </button>
                <button class="notif-filter-btn" data-filter="stoploss">
                  Stop Loss
                </button>
              </div>
              <div id="notif-list" class="notif-list">
                <div class="notif-empty">
                  No notifications in the last 7 days
                </div>
              </div>
            </div>
          </div>

          <div class="nav-profile-wrapper">
                <button id="user-profile-btn" title="View Profile">
                    <span id="user-avatar-initial">U</span>
                </button>
                <div id="profile-dropdown" class="profile-dropdown glass hidden">
                    <div class="profile-header">
                        <div class="profile-avatar-large">U</div>
                        <div class="profile-meta">
                            <h5>User</h5>
                            <span>Code: </span>
                        </div>
                    </div>
                    <div class="profile-body">
                        <div class="profile-info-item">
                            <i class="fas fa-envelope"></i>
                            <span></span>
                        </div>
                    </div>
                    <div class="profile-footer">
                        <button id="logout-btn" class="btn-logout">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </header>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Average Price Calculator (DCA)</h2>
              <button id="addEntryBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Entry
              </button>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Entries Section -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-list"></i>
                  </div>
                  <h3 style="font-weight: 700">Buy Transactions</h3>
                </div>

                <div id="entries-container">
                  <div class="entry-row">
                    <div class="form-group" style="margin-bottom: 0">
                      <label style="font-size: 0.75rem">Price (NPR)</label>
                      <input
                        type="number"
                        class="buy-price"
                        placeholder="e.g. 100"
                        value=""
                      />
                    </div>
                    <div class="form-group" style="margin-bottom: 0">
                      <label style="font-size: 0.75rem">Quantity</label>
                      <input
                        type="number"
                        class="buy-qty"
                        placeholder="e.g. 10"
                        value=""
                      />
                    </div>
                    <div style="margin-top: 1.2rem"></div>
                  </div>
                </div>
              </div>

              <!-- Results Section -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-calculator"></i>
                  </div>
                  <h3 style="font-weight: 700">Weighted Summary</h3>
                </div>

                <div id="dcaResults" class="calculator-results">
                  <!-- Results injected here -->
                </div>

                <div
                  class="form-group"
                  style="
                    margin-top: 2rem;
                    border-top: 1px solid var(--surface-border);
                    padding-top: 1.5rem;
                  "
                >
                  <label>Current LTP (for Gain/Loss analysis)</label>
                  <input
                    type="number"
                    id="currentLtp"
                    placeholder="e.g. 550"
                    value=""
                  />
                </div>

                <div id="profitAnalysis" style="margin-top: 1rem">
                  <!-- Analysis injected here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/calculator/average.js"></script>
    </script>
  </body>
</html>
