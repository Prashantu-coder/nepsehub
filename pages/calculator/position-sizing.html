<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position Sizing | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Position Sizing Calculator</h2>
            </div>

            <div class="tools-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem;">
              <!-- Input Section -->
              <div class="glass" style="padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                  <div style="background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-chart-pie"></i>
                  </div>
                  <h3 style="font-weight: 700">Trade Parameters</h3>
                </div>

                <div class="form-group">
                  <label>Total Account Balance (Rs.)</label>
                  <input type="number" id="balance" placeholder="e.g. 100000" value="100000">
                </div>

                <div class="form-group">
                  <label>Risk Percentage (%)</label>
                  <input type="number" id="riskPercent" placeholder="e.g. 1" value="1" step="0.1">
                </div>

                <div class="form-group">
                  <label>Entry Price (Rs.)</label>
                  <input type="number" id="entryPrice" placeholder="e.g. 500" value="500">
                </div>

                <div class="form-group">
                  <label>Stop Loss (Rs.)</label>
                  <input type="number" id="stopLoss" placeholder="e.g. 480" value="480">
                </div>
              </div>

              <!-- Results Section -->
              <div class="glass" style="padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                  <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="background: var(--secondary); color: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                      <i class="fas fa-calculator"></i>
                    </div>
                    <h3 style="font-weight: 700">Recommended Size</h3>
                  </div>

                  <div id="sizingResults" class="calculator-results">
                    <!-- Results injected here -->
                  </div>
                </div>

                <div id="riskWarning" style="margin-top: 1.5rem; padding: 1rem; border-radius: 12px; font-size: 0.85rem; display: none;">
                  <!-- Warning injected here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/calculator/position-sizing.js"></script>
  </body>
</html>
