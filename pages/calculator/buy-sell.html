<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <!-- Calculator Content -->
          <div class="fade-in">
            <div class="section-header">
              <h2>Calculator</h2>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 1.5rem;
                margin-bottom: 2rem;
              "
            >
              <!-- Buy Calculator -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-shopping-cart"></i>
                  </div>
                  <h3 style="font-weight: 700">Buy Calculator</h3>
                </div>
                <div class="form-group">
                  <label>Units / Quantity</label>
                  <input
                    type="number"
                    id="buyQty"
                    placeholder="e.g. 10"
                    value=""
                  />
                </div>
                <div class="form-group">
                  <label>Purchase Price (Rs.)</label>
                  <input
                    type="number"
                    id="buyPrice"
                    placeholder="e.g. 100"
                    value=""
                  />
                </div>
                <div
                  id="buyResults"
                  class="calculator-results"
                  style="
                    margin-top: 1.5rem;
                    padding: 1.25rem;
                    border-radius: 12px;
                    background: rgba(0, 0, 0, 0.03);
                  "
                ></div>
              </div>

              <!-- Sell Calculator -->
              <div
                class="glass"
                style="
                  padding: 1.5rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 1.5rem;
                  "
                >
                  <div
                    style="
                      background: var(--danger);
                      color: white;
                      width: 40px;
                      height: 40px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                    "
                  >
                    <i class="fas fa-tags"></i>
                  </div>
                  <h3 style="font-weight: 700">Sell Calculator</h3>
                </div>
                <div class="form-group">
                  <label>Units / Quantity</label>
                  <input
                    type="number"
                    id="sellQty"
                    placeholder="e.g. 10"
                    value=""
                  />
                </div>
                <div class="form-group">
                  <label>Selling Price (Rs.)</label>
                  <input
                    type="number"
                    id="sellPrice"
                    placeholder="e.g. 200"
                    value=""
                  />
                </div>

                <!-- WACC Selection -->
                <div class="form-group">
                  <label>WACC Mode</label>
                  <select
                    id="waccMode"
                    style="
                      width: 100%;
                      padding: 0.75rem;
                      border-radius: 10px;
                      border: 1px solid var(--surface-border);
                      background: var(--surface);
                      color: var(--text-primary);
                      font-family: inherit;
                    "
                  >
                    <option value="auto">Automatic (From Buy Calc)</option>
                    <option value="manual">Manual Entry</option>
                  </select>
                </div>

                <div
                  id="manualWaccContainer"
                  class="form-group"
                  style="display: none"
                >
                  <label>Purchase WACC (Rs.)</label>
                  <input
                    type="number"
                    id="manualWacc"
                    placeholder="e.g. 505.2534"
                    step="0.0001"
                    value="0.0000"
                  />
                </div>

                <div
                  id="sellResults"
                  class="calculator-results"
                  style="
                    margin-top: 1.5rem;
                    padding: 1.25rem;
                    border-radius: 12px;
                    background: rgba(0, 0, 0, 0.03);
                  "
                ></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/calculator/buy-sell.js"></script>
    </script>
  </body>
</html>
