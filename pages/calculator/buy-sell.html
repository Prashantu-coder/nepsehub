<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator | NEPSE HUB</title>
  <script src="../../js/session-validator-8f7b2c9d6e4a3b1c.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/easy.css" />
</head>

<body>
  <header class="sticky">
    <div class="flex-row space-between w-full px-5">
      <!-- logo -->
      <div class="flex items-center gap-15">
        <div id="burgerMenu" class="burger-menu">
          <i class="fas fa-bars"></i>
        </div>

        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <span class="logo-text mobile-hide">NEPSE HUB</span>
        </div>
      </div>

      <!-- nepse values -->
      <div class="flex-row content-center items-center gap-5">
        <div id="marketDot" class="blinking-dot"></div>
        <div>
          <h6 class="nepse">NEPSE</h6>
        </div>
        <div id="index-value">
          <div class="flex-col">
            <span id="header-nepse-val" class="font-weight-700 f-16 text-primary">—</span>
            <span id="header-nepse-change" class="f-12 font-weight-600 mr-8">—</span>
          </div>
          <span class="pc-only bg-secondary w-1 h-12"></span>
          <div class="flex-col">
            <span class="pc-only f-16 text-secondary">Turnover:
              <strong id="header-nepse-turnover" class="text-primary">—</strong></span>
            <span class="pc-only f-16 text-secondary">Volume:
              <strong id="header-nepse-volume" class="text-primary">—</strong></span>
          </div>
        </div>
      </div>

      <!-- clock and notification -->
      <div class="flex items-center gap-5 py-8 pr-10">
        <!-- Combined Market Status & Clock Pill -->
        <div class="market-status-pill pc-only">
          <div id="navbar-clock" class="navbar-clock-sub"></div>
          <div id="market-status" class="market-status-sub"></div>
        </div>

        <!-- Notification Bell -->
        <div class="nav-notification-wrapper">
          <button
            id="notification-bell"
            class="btn-icon"
          >
            <i class="far fa-bell"></i>
            <span
              id="notif-badge"
              class="notif-badge hidden"
            >0</span>
          </button>
          <div
            id="notif-dropdown"
            class="notif-dropdown glass hidden"
          >
            <div class="notif-header">
              <h5>Notifications</h5>
              <div class="flex items-center gap-8">
                <button
                  id="sound-toggle-btn"
                  class="sound-toggle"
                  title="Toggle alert sound"
                >
                  <i class="fas fa-volume-up"></i>
                </button>
                <button id="mark-read-btn">Mark all as read</button>
              </div>
            </div>
            <div class="notif-filters">
              <button
                class="notif-filter-btn active"
                data-filter="all"
              >
                All
              </button>
              <button
                class="notif-filter-btn"
                data-filter="buy"
              >
                Buy Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="sell"
              >
                Sell Signals
              </button>
              <button
                class="notif-filter-btn"
                data-filter="stoploss"
              >
                Stop Loss
              </button>
            </div>
            <div
              id="notif-list"
              class="notif-list">
              <div class="notif-empty">
                No notifications in the last 7 days
              </div>
            </div>
          </div>
        </div>

        <div class="nav-profile-wrapper">
          <button id="user-profile-btn" title="View Profile">
            <span id="user-avatar-initial">U</span>
          </button>
          <div id="profile-dropdown" class="profile-dropdown glass hidden">
            <div class="profile-header">
              <div class="profile-avatar-large">U</div>
              <div class="profile-meta">
                <h5>User</h5>
                <span>Code: </span>
              </div>
            </div>
            <div class="profile-body">
              <div class="profile-info-item">
                <i class="fas fa-envelope"></i>
                <span></span>
              </div>
            </div>
            <div class="profile-footer">
              <button id="notif-settings-btn" class="flex justify-center items-center gap-8 px-12 py-9 w-full rounded-10 f-13 font-weight-600 cursor-pointer mb-8" style="
                    background: rgba(99, 102, 241, 0.08);
                    border: 1px solid rgba(99, 102, 241, 0.2);
                    color: #a5b4fc;
                    transition: all 0.2s;
                  ">
                <i class="fas fa-bell f-12"></i>
                Notification Settings
              </button>
              <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <div id="navbar-container"></div>
  <div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div id="app">
        <!-- Calculator Content -->
        <div class="section-header">
          <h2>Calculator</h2>
        </div>

        <div class="tools-grid" style="
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
              gap: 1.5rem;
              margin-bottom: 2rem;
            ">
          <!-- Buy Calculator -->
          <div class="glass" style="
                padding: 1.5rem;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.2);
              ">
            <div style="
                  display: flex;
                  align-items: center;
                  gap: 1rem;
                  margin-bottom: 1.5rem;
                ">
              <div style="
                    background: var(--secondary);
                    color: white;
                    width: 40px;
                    height: 40px;
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  ">
                <i class="fas fa-shopping-cart"></i>
              </div>
              <h3 style="font-weight: 700">Buy Calculator</h3>
            </div>
            <div class="form-group">
              <label>Units / Quantity</label>
              <input type="number" id="buyQty" placeholder="e.g. 10" value="" />
            </div>
            <div class="form-group">
              <label>Purchase Price (Rs.)</label>
              <input type="number" id="buyPrice" placeholder="e.g. 100" value="" />
            </div>
            <div id="buyResults" class="calculator-results" style="
                  margin-top: 1.5rem;
                  padding: 1.25rem;
                  border-radius: 12px;
                  background: rgba(0, 0, 0, 0.03);
                "></div>
          </div>

          <!-- Sell Calculator -->
          <div class="glass" style="
                padding: 1.5rem;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.2);
              ">
            <div style="
                  display: flex;
                  align-items: center;
                  gap: 1rem;
                  margin-bottom: 1.5rem;
                ">
              <div style="
                    background: var(--danger);
                    color: white;
                    width: 40px;
                    height: 40px;
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  ">
                <i class="fas fa-tags"></i>
              </div>
              <h3 style="font-weight: 700">Sell Calculator</h3>
            </div>
            <div class="form-group">
              <label>Units / Quantity</label>
              <input type="number" id="sellQty" placeholder="e.g. 10" value="" />
            </div>
            <div class="form-group">
              <label>Selling Price (Rs.)</label>
              <input type="number" id="sellPrice" placeholder="e.g. 200" value="" />
            </div>

            <!-- WACC Selection -->
            <div class="form-group">
              <label>WACC Mode</label>
              <select id="waccMode" style="
                    width: 100%;
                    padding: 0.75rem;
                    border-radius: 10px;
                    border: 1px solid var(--surface-border);
                    background: var(--surface);
                    color: var(--text-primary);
                    font-family: inherit;
                  ">
                <option value="auto">Automatic (From Buy Calc)</option>
                <option value="manual">Manual Entry</option>
              </select>
            </div>

            <div id="manualWaccContainer" class="form-group" style="display: none">
              <label>Purchase WACC (Rs.)</label>
              <input type="number" id="manualWacc" placeholder="e.g. 505.2534" step="0.0001" value="0.0000" />
            </div>

            <div id="sellResults" class="calculator-results" style="
                  margin-top: 1.5rem;
                  padding: 1.25rem;
                  border-radius: 12px;
                  background: rgba(0, 0, 0, 0.03);
                "></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="ticker-wrapper">
    <div class="ticker-track" id="tickerTrack">
      <div class="loading-placeholder">⏳ Fetching watchlist & live prices... ticker will appear soon</div>
    </div>
  </div>

  <script type="module" src="../../js/pages/calculator/buy-sell.js"></script>
  <script src="../../js/security.js"></script>
  <script src="../../js/7f9c2d4a8b1e5c3d9f0a7b6c2e1d4f8a5c9e7b3d1a6f4c8e2b9d0f7a3c5e1d6.js"></script>
  <script type="module" src="../../components/9a7f3c1e5d8b4a2f6c0e9d7b1a3f5c8e2d6b4a9f1c7e3d5b8a0f2c6e4d9b1a7.js"></script>
</body>

</html>
