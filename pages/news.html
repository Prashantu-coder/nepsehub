<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market News | NEPSE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/pages/news.css">
</head>
<body>
    <!-- Global Splash Loader -->
    <div id="splash-loader" class="splash-loader">
        <div class="nepse-spinner-container">
            <div class="nepse-center-text">NEPSE</div>
            <div class="ring ring-blue"></div>
            <div class="ring ring-green"></div>
        </div>
        <div class="splash-text">Loading...</div>
    </div>
    <div id="navbar-container"></div>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content" style="padding: 2.5rem;">
            <div id="app">
                <div class="fade-in">
                    <div class="section-header" style="margin-bottom: 2rem;">
                        <h2 style="font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px;">News & Announcements</h2>
                    </div>
                    
                    <div class="news-table-container" style="position: relative; min-height: 400px;">
                        <table class="pro-table">
                            <thead>
                                <tr>
                                    <th style="width: 130px;">Date</th>
                                    <th style="width: 110px;">Symbol</th>
                                    <th>Announcement Title</th>
                                    <th style="width: 140px; text-align: center;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="news-table-body">
                                <!-- Dynamic rows here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- News Modal Overlay -->
    <div id="news-modal-overlay" class="modal-overlay">
        <div class="glass modal-content-glass">
            <button id="close-news-modal" class="btn-icon" style="position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.05); border: none; color: var(--text-secondary); cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-times"></i>
            </button>

            <div id="modal-content">
                <div id="modal-date" style="color: var(--primary); font-weight: 700; font-size: 0.85rem; margin-bottom: 0.75rem;">DATE</div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <span id="modal-symbol" class="symbol-badge" style="font-size: 1.1rem; width: auto;">SYMBOL</span>
                    <h2 id="modal-title" style="font-size: 1.5rem; font-weight: 800; line-height: 1.3;">Announcement Title</h2>
                </div>
                
                <div id="modal-details" class="modal-details-box">
                    Announcement details go here...
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <a id="modal-pdf-link" href="#" target="_blank" class="btn btn-pdf">
                        <i class="fas fa-file-pdf"></i> View PDF
                    </a>
                    <button id="modal-close-btn" class="btn btn-outline" style="padding: 1rem; border-radius: 12px;">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/market/news.js"></script>
</body>
</html>
