<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEPSE HUB | Register</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/easy.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <style>
      .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          var(--bg-dark) 0%,
          var(--bg-darker) 100%
        );
        padding: 2rem 0;
      }

      .auth-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-logo {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 0.5rem;
      }

      .auth-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.5rem;
      }

      .auth-subtitle {
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--input-bg);
        color: var(--text);
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .password-strength {
        font-size: 0.75rem;
        margin-top: 0.5rem;
        display: none;
      }

      .strength-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 0.25rem;
      }

      .strength-fill {
        height: 100%;
        width: 0;
        background: #ef4444;
        transition: all 0.3s ease;
      }

      .strength-fill.fair {
        width: 50%;
        background: #f59e0b;
      }

      .strength-fill.good {
        width: 75%;
        background: #3b82f6;
      }

      .strength-fill.strong {
        width: 100%;
        background: #10b981;
      }

      .submit-btn {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }

      .submit-btn:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .error-message {
        color: #ef4444;
        font-size: 0.875rem;
        margin-top: 0.5rem;
        display: none;
      }

      .success-message {
        color: #10b981;
        font-size: 0.875rem;
        margin-top: 0.5rem;
        display: none;
      }

      .form-footer {
        text-align: center;
        margin-top: 1.5rem;
        border-top: 1px solid var(--border);
        padding-top: 1.5rem;
      }

      .form-footer-text {
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      .form-footer-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        margin-left: 0.5rem;
      }

      .form-footer-link:hover {
        text-decoration: underline;
      }

      .loading {
        display: none;
      }

      .loading.active {
        display: inline-block;
        margin-right: 0.5rem;
      }

      .success-box {
        display: none;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid #10b981;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .success-box.active {
        display: block;
      }

      .success-box h3 {
        color: #10b981;
        margin-bottom: 0.5rem;
        font-size: 1rem;
      }

      .success-box p {
        color: var(--text-secondary);
        font-size: 0.875rem;
        margin: 0.5rem 0;
      }

      .code-display {
        background: var(--bg-dark);
        border: 2px solid var(--primary);
        border-radius: 6px;
        padding: 1rem;
        margin: 1rem 0;
        text-align: center;
        font-family: monospace;
        font-size: 1.25rem;
        font-weight: bold;
        color: var(--primary);
      }

      .copy-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }

      .copy-btn:hover {
        background: var(--primary-dark);
      }

      @media (max-width: 600px) {
        .auth-box {
          padding: 2rem;
        }

        .auth-title {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <div class="auth-logo">
            <i class="fas fa-chart-line"></i>
          </div>
          <h1 class="auth-title">NEPSE HUB</h1>
          <p class="auth-subtitle">Create your account</p>
        </div>

        <div class="success-box" id="successBox">
          <h3>✓ Registration Successful!</h3>
          <p>Keep this code secure. You can find this code in your profile.<br>Your unique user code has been generated:</p>
          <div class="code-display" id="codeDisplay"></div>
          <p style="color: #ef4444; font-weight: 600">
            Save this code - you'll need it to login!
          </p>
          <button type="button" class="copy-btn" onclick="copyCode()">
            Copy Code
          </button>
          <p style="margin-top: 1rem">
            <a
              href="login.html"
              style="
                color: var(--primary);
                text-decoration: none;
                font-weight: 600;
              "
            >
              Go to Login
            </a>
          </p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="your@email.com"
              required
            />
            <div class="error-message" id="emailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              id="username"
              class="form-input"
              placeholder="Your username"
              required
            />
            <div class="error-message" id="usernameError"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="At least 8 characters"
              required
            />
            <div class="password-strength" id="passwordStrength">
              <span id="strengthText"></span>
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
            </div>
            <div class="error-message" id="passwordError"></div>
          </div>

          <div id="generalError" class="error-message"></div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="loading" id="loading">
              <i class="fas fa-spinner fa-spin"></i>
            </span>
            <span id="buttonText">Create Account</span>
          </button>
        </form>

        <div class="form-footer">
          <p class="form-footer-text">
            Already have an account?
            <a href="login.html" class="form-footer-link">Login here</a>
          </p>
        </div>
      </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/pages/register.js"></script>
  </body>
</html>
