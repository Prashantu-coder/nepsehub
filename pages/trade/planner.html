<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Planner | NEPSE HUB</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/themes.css" />
  </head>
  <body>
    <div id="navbar-container"></div>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <main class="main-content">
        <div id="app">
          <div class="fade-in">
            <div class="section-header">
              <h2>Trade Planner & Approval System</h2>
            </div>

            <div
              class="tools-grid"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 1.5rem;
              "
            >
              <!-- Input Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--primary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-edit"></i>
                  </div>
                  <h3 style="font-weight: 700">Setup Parameters</h3>
                </div>

                <div class="form-group">
                  <label>Stock Symbol / Name</label>
                  <input
                    type="text"
                    id="stockName"
                    placeholder="e.g. NICA"
                    value=""
                  />
                </div>

                <div
                  style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                  "
                >
                  <div class="form-group">
                    <label>Entry Price (NPR)</label>
                    <input
                      type="number"
                      id="entryPrice"
                      placeholder="500"
                      value=""
                    />
                  </div>
                  <div class="form-group">
                    <label>Stop Loss (NPR)</label>
                    <input
                      type="number"
                      id="stopLoss"
                      placeholder="480"
                      value=""
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label>Target Price (NPR)</label>
                  <input
                    type="number"
                    id="targetPrice"
                    placeholder="550"
                    value=""
                  />
                </div>

                <div
                  class="form-group"
                  style="
                    margin-top: 1.5rem;
                    padding-top: 1.5rem;
                    border-top: 1px solid var(--surface-border);
                  "
                >
                  <label>Total Trading Capital (NPR)</label>
                  <inputW
                    type="number"
                    id="capital"
                    placeholder="100000"
                    value=""
                  />
                </div>

                <div
                  style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                  "
                >
                  <div class="form-group">
                    <label>Risk Mode</label>
                    <select id="riskMode">
                      <option value="percent">Percentage (%)</option>
                      <option value="fixed">Fixed NPR</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label id="riskLabel">Risk Amount</label>
                    <input
                      type="number"
                      id="riskValue"
                      placeholder="1"
                      value="1"
                      step="0.1"
                    />
                  </div>
                </div>
              </div>

              <!-- Result Section -->
              <div
                class="glass"
                style="
                  padding: 2rem;
                  border-radius: 20px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    gap: 1rem;
                    margin-bottom: 2rem;
                  "
                >
                  <div
                    style="
                      background: var(--secondary);
                      color: white;
                      width: 45px;
                      height: 45px;
                      border-radius: 12px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.2rem;
                    "
                  >
                    <i class="fas fa-check-double"></i>
                  </div>
                  <h3 style="font-weight: 700">Approval Results</h3>
                </div>

                <div id="plannerResults" class="calculator-results">
                  <!-- Results here -->
                </div>

                <div
                  id="decisionBadge"
                  style="
                    margin-top: 2rem;
                    padding: 1.5rem;
                    border-radius: 16px;
                    text-align: center;
                    font-weight: 800;
                    font-size: 1.25rem;
                    text-transform: uppercase;
                    letter-spacing: 1px;
                  "
                >
                  <!-- Decision here -->
                </div>

                <div
                  id="warningArea"
                  style="
                    margin-top: 1rem;
                    color: var(--danger);
                    font-size: 0.85rem;
                    text-align: center;
                  "
                ></div>

                <div style="margin-top: 2rem;">
                  <button id="savePlanBtn" class="btn btn-primary" style="width: 100%; padding: 1rem;" disabled>
                    <i class="fas fa-save"></i> Save Trade Plan
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="../../js/pages/trade/planner.js"></script>
    </script>
  </body>
</html>
